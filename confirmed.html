:root{--bone:#FBF9F6;--ink:#241B2E;--gold:#F2C879;--goldtext:#a97e1e;--rose:#E14C6A;--soft:#4b4356;--bone-sub:#C9C1D2;--tint-rose:#F9DBE1}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--ink);color:var(--bone);font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1.25rem;line-height:1.6}

body::after{content:"";position:fixed;inset:0;z-index:30;pointer-events:none;border:clamp(5px,.8vw,10px) solid var(--rose)}
.ticket{background:var(--bone);color:var(--ink);border-radius:16px;padding:2.75rem 2.25rem 1.5rem;max-width:26rem;text-align:center;rotate:-1.2deg;box-shadow:0 18px 50px rgba(0,0,0,.45);position:relative}
.ticket::before,.ticket::after{content:"";position:absolute;top:50%;width:22px;height:22px;border-radius:50%;background:var(--ink);transform:translateY(-50%)}
.ticket::before{left:-11px}.ticket::after{right:-11px}
h1{font-family:'Bricolage';font-weight:800;font-size:2.25rem;letter-spacing:-.03em;margin-top:1.25rem}
p{color:var(--soft);margin-top:.875rem;font-size:1rem}
.callig{width:7rem;margin:0 auto;color:var(--goldtext)}
.callig figcaption{color:var(--soft)}
.stub{border-top:2px dashed rgba(36,27,46,.3);margin-top:1.75rem;padding:1rem 0 .5rem;font-size:.6875rem;font-weight:800;font-family:'Bricolage';letter-spacing:.16em;text-transform:uppercase;color:var(--goldtext)}
.btn{display:inline-flex;margin-top:1.5rem;background:var(--gold);color:var(--ink);border:2px solid var(--ink);border-radius:999px;padding:.8rem 1.5rem;font-weight:600;text-decoration:none}
.callig svg{overflow:visible;display:block;width:100%;height:auto}
.callig .pen{animation-duration:2.3s;animation-timing-function:linear;animation-fill-mode:forwards;animation-play-state:paused}
.callig.in .pen{animation-play-state:running}
.callig figcaption{font-size:.8125rem;font-weight:500;letter-spacing:.05em;opacity:0;transition:opacity 1s ease-out;text-align:center;margin-top:.6rem;white-space:nowrap}
.callig.in figcaption{opacity:1;transition-delay:1.9s}
@media(prefers-reduced-motion:reduce){.callig .pen{animation:none!important;stroke-dashoffset:0!important}.callig figcaption{opacity:1;transition:none}}
