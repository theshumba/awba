.callig figcaption{color:var(--soft);font-family:system-ui}

p{color:var(--soft);margin-top:.75rem}
.btn{display:inline-flex;margin-top:1.75rem;background:var(--gold);color:var(--ink);border:2px solid var(--ink);border-radius:999px;padding:.85rem 1.6rem;font-weight:600;text-decoration:none}
.callig svg{overflow:visible;display:block;width:100%;height:auto}
.callig .pen{animation-duration:2.3s;animation-timing-function:linear;animation-fill-mode:forwards;animation-play-state:paused}
.callig.in .pen{animation-play-state:running}
.callig figcaption{font-size:.8125rem;font-weight:500;letter-spacing:.05em;opacity:0;transition:opacity 1s ease-out;text-align:center;margin-top:.6rem;white-space:nowrap}
.callig.in figcaption{opacity:1;transition-delay:1.9s}
@media(prefers-reduced-motion:reduce){.callig .pen{animation:none!important;stroke-dashoffset:0!important}.callig figcaption{opacity:1;transition:none}}
